apiVersion: v1
kind: Service
metadata:
  name: {{ include "jenkins.fullname" . }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ include "jenkins.fullname" . }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 8080
    - name: agent
      port: {{ .Values.service.agentPort }}
      targetPort: 50000
