apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "multi-ingress.fullname" . }}
  namespace: platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - http:
        paths:
{{- range .Values.paths }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .service.name }}
                port:
                  number: {{ .service.port }}
{{- end }}
