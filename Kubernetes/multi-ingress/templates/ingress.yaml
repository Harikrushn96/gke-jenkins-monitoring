apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "multi-ingress.fullname" . }}
  annotations:
{{- range $key, $value := .Values.annotations }}
    {{ $key }}: {{ $value | quote }}
{{- end }}
spec:
  ingressClassName: {{ .Values.ingressClassName }}
  rules:
    - http:
        paths:
{{- range .Values.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ .service.name }}
                port:
                  number: {{ .service.port }}
{{- end }}
